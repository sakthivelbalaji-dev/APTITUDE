# Railway deployment — deploy backend and frontend as separate services.
# Add PostgreSQL plugin in Railway dashboard and link DATABASE_URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
